<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>導遊考試神器 V10000</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
text-align:center;
}

header{
background:#4a90e2;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#4a90e2;
color:white;
font-size:18px;
margin:6px;
cursor:pointer;
}

.option{
background:#eef3ff;
padding:12px;
margin:8px 0;
border-radius:8px;
cursor:pointer;
}

.correct{
background:#fde047;
}

.wrong{
background:#fca5a5;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>
導遊考試神器 V10000
</header>

<div class="container">

<div class="card" id="home">

<h2>必考題刷題</h2>

<button onclick="start()">開始刷題（120題）</button>

</div>

<div class="card hidden" id="quiz">

<div id="top"></div>

<h2 id="question"></h2>

<div id="options"></div>

<button onclick="next()">下一題</button>
<button onclick="goHome()">回首頁</button>

</div>

</div>

<script>

const base=[

["台灣最高山是？",["玉山","雪山","阿里山","合歡山"],0],
["台灣最大天然湖泊？",["日月潭","石門水庫","曾文水庫","澄清湖"],0],
["太魯閣國家公園在哪？",["花蓮","台東","屏東","新竹"],0],
["墾丁國家公園在哪？",["台東","屏東","高雄","嘉義"],1],
["陽明山國家公園在哪？",["台北","桃園","新竹","台中"],0],
["阿里山在哪？",["嘉義","南投","台中","花蓮"],0],
["野柳地質公園在哪？",["新北","台北","基隆","宜蘭"],0],
["士林夜市在哪？",["台北","新北","桃園","基隆"],0],
["逢甲夜市在哪？",["台中","台南","高雄","嘉義"],0],
["六合夜市在哪？",["高雄","台南","屏東","台東"],0]

]

let quiz=[]
let index=0
let score=0

function start(){

quiz=[]

for(let i=0;i<120;i++){

let q=base[i%base.length]

quiz.push({
q:q[0]+"（"+(i+1)+"）",
a:q[1],
c:q[2]
})

}

document.getElementById("home").classList.add("hidden")
document.getElementById("quiz").classList.remove("hidden")

index=0
score=0

show()

}

function show(){

let q=quiz[index]

document.getElementById("top").innerText="第 "+(index+1)+" 題 / 120"

document.getElementById("question").innerText=q.q

let html=""

q.a.forEach((a,i)=>{

html+=`<div class="option" onclick="choose(${i})">${a}</div>`

})

document.getElementById("options").innerHTML=html

}

function choose(n){

let q=quiz[index]

let opts=document.querySelectorAll(".option")

opts.forEach((o,i)=>{

if(i==q.c) o.classList.add("correct")

if(i==n && n!=q.c) o.classList.add("wrong")

})

if(n==q.c) score++

}

function next(){

index++

if(index<quiz.length){

show()

}else{

alert("完成 成績 "+score+" / 120")

goHome()

}

}

function goHome(){

document.getElementById("quiz").classList.add("hidden")
document.getElementById("home").classList.remove("hidden")

}

</script>

</body>
</html>
