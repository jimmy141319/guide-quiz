<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>導遊考試刷題 V20</title>

<style>
body{
font-family:Arial;
background:#f3f4f6;
margin:0;
padding:20px;
}

.container{
max-width:720px;
margin:auto;
background:white;
padding:24px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{text-align:center;}

.question{
font-size:26px;
margin:20px 0;
font-weight:bold;
}

.answers{
display:grid;
gap:10px;
}

button{
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
background:#e5e7eb;
cursor:pointer;
}

.correct{
background:#fde047 !important;
}

.controls{
margin-top:20px;
display:flex;
gap:10px;
}

.controls button{
flex:1;
background:#2563eb;
color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>導遊考試刷題 V20</h1>

<div id="progress"></div>

<div class="question" id="question"></div>

<div class="answers" id="answers"></div>

<div class="controls">
<button onclick="showAnswer()">顯示答案</button>
<button onclick="nextQuestion()">下一題</button>
</div>

</div>

<script>

const allQuestions = [];

for(let i=1;i<=500;i++){
allQuestions.push({
q:"導遊測驗題目 "+i,
options:["選項A","選項B","選項C","選項D"],
answer:0
});
}

let questions=[];
let current=0;

function start(){

questions=[...allQuestions].sort(()=>Math.random()-0.5).slice(0,10);
current=0;

loadQuestion();

}

function loadQuestion(){

const q=questions[current];

document.getElementById("progress").innerText=
"第 "+(current+1)+" 題 / 共 "+questions.length+" 題";

document.getElementById("question").innerText=q.q;

const answers=document.getElementById("answers");

answers.innerHTML="";

q.options.forEach((opt,i)=>{

const btn=document.createElement("button");

btn.innerText=opt;

btn.onclick=()=>selectAnswer(i);

answers.appendChild(btn);

});

}

function selectAnswer(i){

const q=questions[current];

const buttons=document.querySelectorAll("#answers button");

buttons[q.answer].classList.add("correct");

}

function showAnswer(){

const q=questions[current];

const buttons=document.querySelectorAll("#answers button");

buttons[q.answer].classList.add("correct");

}

function nextQuestion(){

current++;

if(current>=questions.length){

alert("測驗完成");

start();

}else{

loadQuestion();

}

}

start();

</script>

</body>
</html>
