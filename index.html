<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>導遊考試神器 V4000</title>
<style>
body{
  font-family:Arial,Helvetica,sans-serif;
  background:#f5f7fb;
  margin:0;
  text-align:center;
}
header{
  background:#4a90e2;
  color:white;
  padding:24px;
  font-size:30px;
  font-weight:bold;
}
.container{
  max-width:760px;
  margin:auto;
  padding:24px;
}
.card{
  background:white;
  padding:28px;
  border-radius:14px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}
button{
  padding:14px 22px;
  border:none;
  border-radius:10px;
  background:#4a90e2;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin:8px;
}
button:hover{
  background:#357abd;
}
.option{
  display:block;
  width:100%;
  margin:10px 0;
  padding:14px;
  background:#eef3ff;
  border-radius:10px;
  cursor:pointer;
  font-size:20px;
  box-sizing:border-box;
}
.option:hover{
  background:#dfe8ff;
}
.correct{
  background:#fde047 !important;
}
.wrong{
  background:#fca5a5 !important;
}
.result{
  font-size:26px;
  font-weight:bold;
  margin-top:20px;
}
.small{
  color:#666;
  font-size:16px;
}
#explanation{
  margin-top:16px;
  font-size:18px;
  color:#333;
  min-height:28px;
}
#topbar{
  font-size:18px;
  margin-bottom:18px;
  color:#333;
}
.hidden{
  display:none;
}
.footer{
  margin-top:30px;
  font-size:14px;
  color:#888;
}
</style>
</head>
<body>

<header>導遊考試神器 V4000</header>

<div class="container">

  <div class="card" id="start">
    <h2>華語導遊刷題系統</h2>
    <p>分科刷題版</p>
    <button onclick="startQuiz('resource')">觀光資源</button>
    <button onclick="startQuiz('practice')">導遊實務</button>
    <button onclick="startQuiz('law')">導遊法規</button>
    <button onclick="startQuiz('all')">全部題庫</button>
  </div>

  <div class="card hidden" id="quizBox">
    <div id="topbar"></div>
    <h2 id="question"></h2>
    <div id="options"></div>
    <div id="explanation"></div>
    <button id="nextBtn" class="hidden" onclick="nextQuestion()">下一題</button>
    <button onclick="goHome()">回首頁</button>
  </div>

  <div class="card hidden" id="resultBox">
    <div class="result" id="scoreText"></div>
    <p id="resultDetail"></p>
    <button onclick="restart()">重新測驗</button>
    <button onclick="goHome()">回首頁</button>
  </div>

</div>

<div class="footer">Version V4000</div>

<script>
const resourceQuestions = [
  {q:"台灣最高山是？",a:["玉山","雪山","阿里山","合歡山"],c:0,e:"正確答案是玉山。"},
  {q:"日月潭位於哪個縣市？",a:["台中","南投","嘉義","花蓮"],c:1,e:"正確答案是南投。"},
  {q:"太魯閣國家公園位於哪裡？",a:["花蓮","台東","屏東","新竹"],c:0,e:"正確答案是花蓮。"},
  {q:"台江國家公園位於哪裡？",a:["台南","高雄","屏東","嘉義"],c:0,e:"正確答案是台南。"},
  {q:"墾丁國家公園位於哪裡？",a:["屏東","高雄","台東","宜蘭"],c:0,e:"正確答案是屏東。"},
  {q:"故宮博物院位於哪裡？",a:["台北","台中","台南","高雄"],c:0,e:"正確答案是台北。"},
  {q:"阿里山位於哪個縣？",a:["嘉義","南投","花蓮","台東"],c:0,e:"正確答案是嘉義。"},
  {q:"陽明山國家公園位於哪裡？",a:["台北","台中","台南","高雄"],c:0,e:"正確答案是台北。"},
  {q:"野柳地質公園位於哪裡？",a:["新北","台北","花蓮","宜蘭"],c:0,e:"正確答案是新北。"},
  {q:"金門國家公園位於哪裡？",a:["金門","澎湖","台東","屏東"],c:0,e:"正確答案是金門。"}
];

const practiceQuestions = [
  {q:"導遊最重要的責任是？",a:["旅客安全","購物安排","拍照速度","自由活動"],c:0,e:"正確答案是旅客安全。"},
  {q:"旅客走失時第一步應？",a:["立即聯絡並協助找回","直接繼續行程","先購物","先回飯店"],c:0,e:"正確答案是立即聯絡並協助找回。"},
  {q:"旅客身體不適時應優先？",a:["協助就醫","繼續行程","先拍照","先吃飯"],c:0,e:"正確答案是協助就醫。"},
  {q:"導遊解說應重視？",a:["清楚正確","越快越好","越短越好","只說英文"],c:0,e:"正確答案是清楚正確。"},
  {q:"導遊帶團服務核心是？",a:["安全與品質","大量購物","快速結束","少說少做"],c:0,e:"正確答案是安全與品質。"},
  {q:"導遊面對旅客問題應？",a:["耐心處理","直接忽略","推給別人","先離開"],c:0,e:"正確答案是耐心處理。"},
  {q:"導遊出發前應先確認？",a:["集合時間與名單","購物點","自拍角度","餐廳音樂"],c:0,e:"正確答案是集合時間與名單。"},
  {q:"導遊遇緊急狀況最重要的是？",a:["保持冷靜","先責怪旅客","先拍照","先休息"],c:0,e:"正確答案是保持冷靜。"},
  {q:"導遊介紹景點時應？",a:["正確清楚","隨意發揮","誇大不實","只講笑話"],c:0,e:"正確答案是正確清楚。"},
  {q:"導遊主要服務對象是？",a:["旅客","司機","商店","自己"],c:0,e:"正確答案是旅客。"}
];

const lawQuestions = [
  {q:"旅行業主管機關常見答案為？",a:["交通部觀光署","教育部","文化部","勞動部"],c:0,e:"正確答案是交通部觀光署。"},
  {q:"導遊執業需持有？",a:["導遊證","駕照","護照","學生證"],c:0,e:"正確答案是導遊證。"},
  {q:"旅行服務核心在於？",a:["安全與品質","大量購物","快速結束","減少說明"],c:0,e:"正確答案是安全與品質。"},
  {q:"旅遊行程安排原則是？",a:["合理與安全","越滿越好","越晚越好","越亂越好"],c:0,e:"正確答案是合理與安全。"},
  {q:"旅行業依法應重視？",a:["旅客權益","私人利益","個人情緒","隨意加價"],c:0,e:"正確答案是旅客權益。"},
  {q:"導遊執業應重視？",a:["職業倫理","個人方便","隨意解說","誇大資訊"],c:0,e:"正確答案是職業倫理。"},
  {q:"導遊處理資料時應？",a:["保護旅客資訊","公開分享","隨手外流","任意散布"],c:0,e:"正確答案是保護旅客資訊。"},
  {q:"導遊面對糾紛應？",a:["依法妥善處理","直接離開","先吵架","拒絕溝通"],c:0,e:"正確答案是依法妥善處理。"},
  {q:"旅客權益受損時應？",a:["優先協助處理","裝作沒看到","延後再說","推給旅客"],c:0,e:"正確答案是優先協助處理。"},
  {q:"合法執業最重要是？",a:["遵守法規","隨意帶團","只靠經驗","不必證照"],c:0,e:"正確答案是遵守法規。"}
];

let quiz = [];
let current = 0;
let score = 0;
let answered = false;
let currentMode = "";

function shuffle(arr){
  return [...arr].sort(()=>0.5 - Math.random());
}

function startQuiz(type){
  currentMode = type;
  if(type === "resource") quiz = shuffle(resourceQuestions);
  if(type === "practice") quiz = shuffle(practiceQuestions);
  if(type === "law") quiz = shuffle(lawQuestions);
  if(type === "all") quiz = shuffle([...resourceQuestions, ...practiceQuestions, ...lawQuestions]);

  current = 0;
  score = 0;
  answered = false;

  document.getElementById("start").classList.add("hidden");
  document.getElementById("resultBox").classList.add("hidden");
  document.getElementById("quizBox").classList.remove("hidden");

  showQuestion();
}

function modeText(){
  if(currentMode === "resource") return "觀光資源";
  if(currentMode === "practice") return "導遊實務";
  if(currentMode === "law") return "導遊法規";
  return "全部題庫";
}

function showQuestion(){
  answered = false;
  document.getElementById("explanation").innerText = "";
  document.getElementById("nextBtn").classList.add("hidden");

  const q = quiz[current];
  document.getElementById("topbar").innerText =
    modeText() + "｜第 " + (current+1) + " 題 / 共 " + quiz.length + " 題｜目前得分：" + score;
  document.getElementById("question").innerText = q.q;

  let html = "";
  for(let i=0;i<q.a.length;i++){
    html += `<div class="option" onclick="choose(${i})">${q.a[i]}</div>`;
  }
  document.getElementById("options").innerHTML = html;
}

function choose(i){
  if(answered) return;
  answered = true;

  const q = quiz[current];
  const opts = document.querySelectorAll(".option");

  opts.forEach((el,index)=>{
    if(index === q.c) el.classList.add("correct");
    if(index === i && i !== q.c) el.classList.add("wrong");
  });

  if(i === q.c) score++;

  document.getElementById("explanation").innerText = q.e;
  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
  current++;
  if(current < quiz.length){
    showQuestion();
  }else{
    finish();
  }
}

function finish(){
  document.getElementById("quizBox").classList.add("hidden");
  document.getElementById("resultBox").classList.remove("hidden");
  document.getElementById("scoreText").innerText = modeText() + " 完成！得分 " + score + " / " + quiz.length;
  document.getElementById("resultDetail").innerText = "正確率：" + Math.round(score/quiz.length*100) + "%";
}

function restart(){
  startQuiz(currentMode);
}

function goHome(){
  document.getElementById("quizBox").classList.add("hidden");
  document.getElementById("resultBox").classList.add("hidden");
  document.getElementById("start").classList.remove("hidden");
}
</script>

</body>
</html>
