<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>導遊考試刷題</title>

<style>

body{
font-family:Arial;
background:#f2f3f5;
padding:30px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
}

button{
width:100%;
padding:15px;
margin:8px 0;
font-size:18px;
border:none;
border-radius:8px;
background:#e5e7eb;
cursor:pointer;
}

button:hover{
background:#d1d5db;
}

</style>

</head>

<body>

<div class="container">

<h1>導遊考試刷題</h1>

<p id="progress"></p>

<h2 id="question"></h2>

<button onclick="answer(0)" id="a"></button>
<button onclick="answer(1)" id="b"></button>
<button onclick="answer(2)" id="c"></button>
<button onclick="answer(3)" id="d"></button>

<h3 id="result"></h3>

</div>

<script>

let questions=[

{
q:"台灣最高山為？",
options:["玉山","雪山","阿里山","合歡山"],
answer:0
},

{
q:"日月潭位於哪個縣市？",
options:["台中","南投","嘉義","花蓮"],
answer:1
},

{
q:"太魯閣國家公園在哪裡？",
options:["台東","花蓮","宜蘭","屏東"],
answer:1
},

{
q:"阿里山在哪個縣？",
options:["嘉義","南投","花蓮","台東"],
answer:0
}

];

let current=0;
let score=0;

function load(){

let q=questions[current];

document.getElementById("progress").innerText=
"第 "+(current+1)+" 題 / "+questions.length+" 題";

document.getElementById("question").innerText=q.q;

document.getElementById("a").innerText=q.options[0];
document.getElementById("b").innerText=q.options[1];
document.getElementById("c").innerText=q.options[2];
document.getElementById("d").innerText=q.options[3];

}

function answer(i){

let correct=questions[current].answer;

if(i==correct){

document.getElementById("result").innerText="✔ 正確";

score++;

}else{

document.getElementById("result").innerText="✘ 錯誤";

}

current++;

if(current<questions.length){

setTimeout(function(){

document.getElementById("result").innerText="";

load();

},1000);

}else{

document.getElementById("question").innerText="測驗完成";

document.getElementById("progress").innerText=
"得分："+score+" / "+questions.length;

}

}

load();

</script>

</body>
</html>
