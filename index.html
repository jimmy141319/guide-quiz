<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>導遊考試神器 V800</title>
<style>
body{
  font-family:Arial,Helvetica,sans-serif;
  background:#f5f7fb;
  margin:0;
  padding:0;
  text-align:center;
}
header{
  background:#4a90e2;
  color:white;
  padding:25px;
  font-size:28px;
  font-weight:bold;
}
.container{
  max-width:700px;
  margin:auto;
  padding:30px;
}
.card{
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}
button{
  padding:14px 20px;
  border:none;
  border-radius:8px;
  background:#4a90e2;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin:8px;
}
button:hover{
  background:#357ABD;
}
.option{
  display:block;
  width:100%;
  margin:10px 0;
  padding:14px;
  background:#eef3ff;
  border-radius:8px;
  cursor:pointer;
  font-size:20px;
}
.option:hover{
  background:#dfe8ff;
}
.correct{
  background:#fde047 !important;
}
.wrong{
  background:#fca5a5 !important;
}
.result{
  font-size:24px;
  font-weight:bold;
  margin-top:20px;
}
.footer{
  margin-top:40px;
  font-size:14px;
  color:#888;
}
#explanation{
  margin-top:16px;
  font-size:18px;
  color:#333;
}
</style>
</head>
<body>

<header>導遊考試神器 V800</header>

<div class="container">

<div class="card" id="start">
  <h2>華語導遊刷題</h2>
  <p>點下面開始練習</p>
  <button onclick="startQuiz()">開始刷題</button>
</div>

<div class="card" id="quiz" style="display:none">
  <h2 id="question"></h2>
  <div id="options"></div>
  <div id="explanation"></div>
  <button id="nextBtn" onclick="nextQuestion()" style="display:none;">下一題</button>
</div>

<div class="card" id="result" style="display:none">
  <div class="result" id="resultText"></div>
  <button onclick="restart()">重新測驗</button>
</div>

</div>

<div class="footer">Version V800</div>

<script>
const quizData = [
  {
    q:"台灣最高山是？",
    a:["玉山","雪山","阿里山","合歡山"],
    correct:0,
    exp:"正確答案是玉山。"
  },
  {
    q:"日月潭位於哪個縣市？",
    a:["台中","南投","嘉義","花蓮"],
    correct:1,
    exp:"正確答案是南投。"
  },
  {
    q:"太魯閣國家公園位於哪裡？",
    a:["花蓮","台東","屏東","新竹"],
    correct:0,
    exp:"正確答案是花蓮。"
  }
];

let current = 0;
let score = 0;
let answered = false;

function startQuiz(){
  document.getElementById("start").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  showQuestion();
}

function showQuestion(){
  answered = false;
  document.getElementById("explanation").innerText = "";
  document.getElementById("nextBtn").style.display = "none";

  let q = quizData[current];
  document.getElementById("question").innerText = q.q;

  let html = "";
  for(let i=0;i<q.a.length;i++){
    html += `<div class="option" onclick="choose(${i})">${q.a[i]}</div>`;
  }
  document.getElementById("options").innerHTML = html;
}

function choose(i){
  if(answered) return;
  answered = true;

  let q = quizData[current];
  let opts = document.querySelectorAll(".option");

  opts.forEach((el,index)=>{
    if(index === q.correct) el.classList.add("correct");
    if(index === i && i !== q.correct) el.classList.add("wrong");
  });

  if(i === q.correct) score++;

  document.getElementById("explanation").innerText = q.exp;
  document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion(){
  current++;
  if(current < quizData.length){
    showQuestion();
  }else{
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").style.display = "none";
  document.getElementById("result").style.display = "block";
  document.getElementById("resultText").innerText = "完成！答對 " + score + " / " + quizData.length;
}

function restart(){
  current = 0;
  score = 0;
  answered = false;
  document.getElementById("result").style.display = "none";
  document.getElementById("start").style.display = "block";
}
</script>

</body>
</html>
