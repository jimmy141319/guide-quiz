<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>導遊考試刷題 V30</title>
<style>
body{
  font-family:Arial,sans-serif;
  background:#f3f4f6;
  margin:0;
  padding:20px;
}
.container{
  max-width:860px;
  margin:30px auto;
  background:#fff;
  padding:24px;
  border-radius:18px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
}
h1{
  text-align:center;
  margin-bottom:8px;
  font-size:34px;
}
.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:18px;
}
.toolbar{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:18px;
}
select{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}
.status{
  display:flex;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:18px;
  color:#555;
  font-size:18px;
}
.question-number{
  color:#666;
  margin-bottom:8px;
}
.question{
  font-size:30px;
  font-weight:bold;
  line-height:1.5;
  margin-bottom:20px;
}
.answers{
  display:grid;
  gap:12px;
}
.answer-btn{
  width:100%;
  padding:16px;
  font-size:24px;
  border:none;
  border-radius:12px;
  background:#e5e7eb;
  cursor:pointer;
  transition:0.2s;
}
.answer-btn:hover{
  background:#d1d5db;
}
.correct{
  background:#fde047 !important;
  color:#111 !important;
}
.wrong{
  background:#fca5a5 !important;
  color:#111 !important;
}
.result{
  margin-top:18px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  min-height:34px;
}
.note{
  text-align:center;
  color:#444;
  font-size:18px;
  min-height:28px;
  margin-top:6px;
  line-height:1.6;
}
.controls{
  margin-top:20px;
  text-align:center;
}
.btn{
  padding:12px 20px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin:6px;
}
.btn:hover{
  background:#1d4ed8;
}
.hidden{
  display:none;
}
.finish{
  text-align:center;
  padding:20px 0;
}
.finish h2{
  font-size:32px;
  margin-bottom:12px;
}
.score{
  font-size:28px;
  font-weight:bold;
  margin-bottom:8px;
}
.rate{
  font-size:22px;
  color:#555;
  margin-bottom:16px;
}
@media (max-width: 600px){
  h1{font-size:28px;}
  .question{font-size:24px;}
  .answer-btn{font-size:20px;}
  .result{font-size:20px;}
  .note{font-size:16px;}
}
</style>
</head>
<body>
<div class="container">
  <h1>導遊考試刷題 V30</h1>
  <div class="subtitle">真正題目版・分科練習・模擬考試</div>

  <div class="toolbar">
    <label for="subject">科目：</label>
    <select id="subject" onchange="restartQuiz()">
      <option value="all">全部題庫</option>
      <option value="resource">觀光資源</option>
      <option value="practice">導遊實務</option>
      <option value="law">觀光法規</option>
    </select>

    <label for="mode">模式：</label>
    <select id="mode" onchange="restartQuiz()">
      <option value="10">練習 10 題</option>
      <option value="50">模擬考 50 題</option>
      <option value="100">完整考 100 題</option>
      <option value="all">全部題目</option>
    </select>
  </div>

  <div id="quiz-area">
    <div class="status">
      <div id="progress-text">第 1 題 / 共 10 題</div>
      <div id="score-text">目前答對：0 題</div>
    </div>

    <div class="question-number" id="question-number"></div>
    <div class="question" id="question"></div>

    <div class="answers">
      <button class="answer-btn" id="btn0" onclick="selectAnswer(0)"></button>
      <button class="answer-btn" id="btn1" onclick="selectAnswer(1)"></button>
      <button class="answer-btn" id="btn2" onclick="selectAnswer(2)"></button>
      <button class="answer-btn" id="btn3" onclick="selectAnswer(3)"></button>
    </div>

    <div class="result" id="result"></div>
    <div class="note" id="note"></div>

    <div class="controls">
      <button class="btn" onclick="showAnswer()">顯示答案</button>
      <button class="btn hidden" id="nextBtn" onclick="nextQuestion()">下一題</button>
    </div>
  </div>

  <div id="finish-area" class="hidden">
    <div class="finish">
      <h2>測驗完成</h2>
      <div class="score" id="final-score"></div>
      <div class="rate" id="final-rate"></div>
      <button class="btn" onclick="restartQuiz()">重新開始</button>
    </div>
  </div>
</div>
