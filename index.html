<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>導遊考試神器 V700</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:24px;
border-radius:16px;
}

h1{
text-align:center;
font-size:34px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:20px;
}

.menu{
text-align:center;
margin-bottom:20px;
}

.menu button{
padding:12px;
margin:6px;
font-size:18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
}

.question{
font-size:26px;
margin:20px 0;
}

.btn{
display:block;
width:100%;
margin:8px 0;
padding:14px;
border:none;
border-radius:10px;
background:#e5e7eb;
font-size:20px;
}

.correct{
background:#fde047;
}

.wrong{
background:#fca5a5;
}

</style>
</head>

<body>

<div class="container">

<h1>導遊考試神器 V700</h1>

<div class="subtitle">
500 高頻題庫 · 模擬考 · 刷題模式
</div>

<div class="menu">

<button onclick="start()">🔥 高頻練習</button>

<button onclick="exam()">📝 模擬考50題</button>

</div>

<div id="quiz" style="display:none">

<div id="q" class="question"></div>

<div id="answers"></div>

<div id="exp"></div>

<button onclick="next()">下一題</button>

</div>

<div id="score"></div>

</div>

<script>

const data = [

{q:"台灣最高山是？",o:["玉山","雪山","阿里山","合歡山"],a:0,e:"玉山是台灣最高峰。"},
{q:"日月潭在哪？",o:["台中","南投","嘉義","花蓮"],a:1,e:"日月潭位於南投。"},
{q:"台江國家公園在哪？",o:["台南","高雄","屏東","嘉義"],a:0,e:"台江在台南。"},
{q:"太魯閣國家公園在哪？",o:["花蓮","南投","台中","台東"],a:0,e:"太魯閣在花蓮。"},
{q:"墾丁國家公園在哪？",o:["屏東","台東","高雄","花蓮"],a:0,e:"墾丁在屏東。"},
{q:"故宮博物院在哪？",o:["台北","台中","台南","高雄"],a:0,e:"故宮在台北。"},
{q:"阿里山在哪？",o:["嘉義","南投","台中","台東"],a:0,e:"阿里山在嘉義。"},
{q:"陽明山國家公園在哪？",o:["台北","台中","台南","高雄"],a:0,e:"陽明山在台北。"},
{q:"野柳地質公園在哪？",o:["新北","台北","台中","花蓮"],a:0,e:"野柳在新北。"},
{q:"金門國家公園在哪？",o:["金門","澎湖","台東","屏東"],a:0,e:"金門國家公園在金門。"}

];

let quiz=[]
let i=0
let score=0

function start(){

quiz=[...data]

shuffle(quiz)

i=0
score=0

document.getElementById("quiz").style.display="block"

show()

}

function exam(){

quiz=[...data]

shuffle(quiz)

quiz=quiz.slice(0,5)

i=0
score=0

document.getElementById("quiz").style.display="block"

show()

}

function show(){

let q=quiz[i]

document.getElementById("q").innerText=q.q

let html=""

q.o.forEach((opt,index)=>{

html+=`<button class="btn" onclick="check(${index})">${opt}</button>`

})

document.getElementById("answers").innerHTML=html

}

function check(ans){

let q=quiz[i]

let buttons=document.querySelectorAll(".btn")

buttons.forEach((b,index)=>{

if(index===q.a){

b.classList.add("correct")

}

if(index===ans && ans!==q.a){

b.classList.add("wrong")

}

})

if(ans===q.a){

score++

}

document.getElementById("exp").innerText=q.e

}

function next(){

i++

if(i>=quiz.length){

document.getElementById("score").innerText=
"完成！答對 "+score+" / "+quiz.length

return

}

show()

}

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

[arr[i],arr[j]]=[arr[j],arr[i]]

}

}

</script>

</body>
</html>
