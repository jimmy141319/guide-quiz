<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>導遊考試刷題</title>
<style>
body{
  font-family:Arial,sans-serif;
  background:#f3f4f6;
  margin:0;
  padding:20px;
}
.box{
  max-width:860px;
  margin:30px auto;
  background:#fff;
  padding:24px;
  border-radius:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}
h1{
  text-align:center;
  margin-bottom:10px;
}
.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:18px;
}
select{
  padding:10px 12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
  background:#fff;
}
.meta{
  color:#555;
  margin-bottom:12px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}
.section-badge{
  text-align:center;
  font-size:18px;
  color:#444;
  margin-top:6px;
  margin-bottom:10px;
}
.q{
  font-size:28px;
  font-weight:bold;
  margin:20px 0;
  min-height:48px;
  line-height:1.5;
}
.answers{
  display:grid;
  gap:12px;
}
button{
  padding:16px;
  font-size:22px;
  border:none;
  border-radius:12px;
  background:#e5e7eb;
  cursor:pointer;
}
button:hover{
  background:#d1d5db;
}
.correct{
  background:#fde047 !important;
  color:#111 !important;
}
.wrong{
  background:#fca5a5 !important;
  color:#111 !important;
}
.controls{
  text-align:center;
  margin-top:18px;
}
.action{
  background:#2563eb;
  color:#fff;
  margin:6px;
}
.note,.result{
  text-align:center;
  margin-top:12px;
  min-height:28px;
  font-size:20px;
}
@media (max-width:600px){
  .q{font-size:24px;}
  button{font-size:20px;}
}
</style>
</head>
<body>
<div class="box">
  <h1>導遊考試刷題</h1>

  <div class="toolbar">
    <select id="subject" onchange="startQuiz()">
      <option value="all">全部隨機</option>
      <option value="resource">第一節：觀光資源</option>
      <option value="law">第二節：法規行政</option>
      <option value="practice">第三節：導遊實務</option>
    </select>

    <select id="count" onchange="startQuiz()">
      <option value="10">練習 10 題</option>
      <option value="50">模擬 50 題</option>
      <option value="150">正式考試 150 題</option>
    </select>
  </div>

  <div class="meta">
    <div id="progress"></div>
    <div id="score"></div>
  </div>

  <div class="section-badge" id="sectionLabel"></div>
  <div class="q" id="question"></div>

  <div class="answers">
    <button id="btn0" onclick="selectAnswer(0)"></button>
    <button id="btn1" onclick="selectAnswer(1)"></button>
    <button id="btn2" onclick="selectAnswer(2)"></button>
    <button id="btn3" onclick="selectAnswer(3)"></button>
  </div>

  <div class="result" id="result"></div>
  <div class="note" id="note"></div>

  <div class="controls">
    <button class="action" onclick="showAnswer()">顯示答案</button>
    <button class="action" onclick="nextQuestion()">下一題</button>
  </div>
</div>

<script src="questions.js"></script>
<script>
let quizQuestions = [];
let current = 0;
let score = 0;
let locked = false;
let currentOrder = [0,1,2,3];

function fisherYates(array){
  const arr = [...array];
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function getSectionName(subject){
  if(subject==="resource") return "第一節：觀光資源";
  if(subject==="law") return "第二節：法規行政";
  if(subject==="practice") return "第三節：導遊實務";
  return "全部隨機";
}

function showEmptyMessage(){
  document.getElementById("progress").innerText="第 0 題 / 共 0 題";
  document.getElementById("score").innerText="答對 0 題";
  document.getElementById("sectionLabel").innerText="";
  document.getElementById("question").innerText="目前這個科目還沒有題目";
  document.getElementById("result").innerText="";
  document.getElementById("note").innerText="";
  for(let i=0;i<4;i++){
    const btn=document.getElementById("btn"+i);
    btn.innerText="";
    btn.disabled=true;
    btn.classList.remove("correct","wrong");
  }
}

function pickUnique(pool,count){
  return fisherYates(pool).slice(0,Math.min(count,pool.length));
}

function buildOfficialExam(){
  const resourcePool = pickUnique(questions.filter(q=>q.subject==="resource"),50);
  const lawPool = pickUnique(questions.filter(q=>q.subject==="law"),50);
  const practicePool = pickUnique(questions.filter(q=>q.subject==="practice"),50);
  return [...resourcePool,...lawPool,...practicePool];
}

function startQuiz(){
  const subject=document.getElementById("subject").value;
  const count=document.getElementById("count").value;

  if(count==="150"){
    quizQuestions = buildOfficialExam();
  }else{
    let pool=[...questions];
    if(subject!=="all"){
      pool=pool.filter(q=>q.subject===subject);
    }
    if(pool.length===0){
      quizQuestions=[];
      showEmptyMessage();
      return;
    }
    quizQuestions=pickUnique(pool,parseInt(count,10));
  }

  if(!quizQuestions.length){
    showEmptyMessage();
    return;
  }

  current=0;
  score=0;
  locked=false;
  render();
}

function render(){
  const q=quizQuestions[current];

  document.getElementById("progress").innerText=`第 ${current+1} 題 / 共 ${quizQuestions.length} 題`;
  document.getElementById("score").innerText=`答對 ${score} 題`;
  document.getElementById("sectionLabel").innerText=getSectionName(q.subject);
  document.getElementById("question").innerText=q.q;
  document.getElementById("result").innerText="";
  document.getElementById("note").innerText="";

  currentOrder=fisherYates([0,1,2,3]);

  for(let i=0;i<4;i++){
    const btn=document.getElementById("btn"+i);
    btn.innerText=q.options[currentOrder[i]];
    btn.classList.remove("correct","wrong");
    btn.disabled=false;
  }

  locked=false;
}

function showAnswer(){
  if(locked || !quizQuestions.length) return;
  const q=quizQuestions[current];
  const correctButtonIndex=currentOrder.indexOf(q.answer);
  document.getElementById("btn"+correctButtonIndex).classList.add("correct");
  document.getElementById("note").innerText=`正確答案：${q.options[q.answer]}`;
}

function selectAnswer(i){
  if(locked || !quizQuestions.length) return;
  locked=true;

  const q=quizQuestions[current];
  const actualAnswerIndex=currentOrder[i];
  const correctButtonIndex=currentOrder.indexOf(q.answer);

  for(let j=0;j<4;j++){
    document.getElementById("btn"+j).disabled=true;
  }

  if(actualAnswerIndex===q.answer){
    document.getElementById("btn"+i).classList.add("correct");
    document.getElementById("result").innerText="✔ 答對了";
    score++;
    document.getElementById("score").innerText=`答對 ${score} 題`;
  }else{
    document.getElementById("btn"+i).classList.add("wrong");
    document.getElementById("btn"+correctButtonIndex).classList.add("correct");
    document.getElementById("result").innerText="✘ 答錯了";
  }

  document.getElementById("note").innerText=`正確答案：${q.options[q.answer]}`;
}

function nextQuestion(){
  if(!quizQuestions.length) return;

  current++;

  if(current>=quizQuestions.length){
    const total=quizQuestions.length;
    const rate=Math.round((score/total)*100);
    alert(`測驗完成\n答對 ${score} / ${total} 題\n正確率 ${rate}%`);
    startQuiz();
    return;
  }

  render();
}

startQuiz();
</script>
</body>
</html>
