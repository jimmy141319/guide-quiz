<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Guide Quiz V800</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f7fb;
margin:0;
padding:0;
text-align:center;
}

header{
background:#4a90e2;
color:white;
padding:25px;
font-size:28px;
font-weight:bold;
}

.container{
max-width:700px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

button{
padding:14px 20px;
border:none;
border-radius:8px;
background:#4a90e2;
color:white;
font-size:18px;
cursor:pointer;
margin:8px;
}

button:hover{
background:#357ABD;
}

.option{
display:block;
width:100%;
margin:10px 0;
padding:14px;
background:#eef3ff;
border-radius:8px;
cursor:pointer;
}

.option:hover{
background:#dfe8ff;
}

.result{
font-size:24px;
font-weight:bold;
margin-top:20px;
}

.footer{
margin-top:40px;
font-size:14px;
color:#888;
}

</style>
</head>

<body>

<header>
Guide Quiz V800
</header>

<div class="container">

<div class="card" id="start">
<h2>歡迎測驗</h2>
<p>回答問題看看你的結果</p>
<button onclick="startQuiz()">開始測驗</button>
</div>

<div class="card" id="quiz" style="display:none">
<h2 id="question"></h2>
<div id="options"></div>
</div>

<div class="card" id="result" style="display:none">
<div class="result" id="resultText"></div>
<button onclick="restart()">重新測驗</button>
</div>

</div>

<div class="footer">
Version V800
</div>

<script>

const quizData=[
{
q:"你比較喜歡哪種工作？",
a:["創意","管理","穩定","自由"]
},
{
q:"你比較重視什麼？",
a:["收入","興趣","安全","時間"]
},
{
q:"你比較像哪種人？",
a:["創業者","主管","工程師","旅人"]
}
];

let current=0;
let score=[0,0,0,0];

function startQuiz(){
document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";
showQuestion();
}

function showQuestion(){

let q=quizData[current];

document.getElementById("question").innerText=q.q;

let html="";

for(let i=0;i<q.a.length;i++){

html+=`<div class="option" onclick="choose(${i})">${q.a[i]}</div>`;

}

document.getElementById("options").innerHTML=html;

}

function choose(i){

score[i]++;

current++;

if(current<quizData.length){

showQuestion();

}else{

showResult();

}

}

function showResult(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

let max=Math.max(...score);
let index=score.indexOf(max);

let text="";

if(index==0) text="創業型人格";
if(index==1) text="領導型人格";
if(index==2) text="技術型人格";
if(index==3) text="自由型人格";

document.getElementById("resultText").innerText="你的類型："+text;

}

function restart(){

location.reload();

}

</script>

</body>
</html>
