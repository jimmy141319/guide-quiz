<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>導遊考試神器 V4000</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
text-align:center;
}

header{
background:#4a90e2;
color:white;
padding:25px;
font-size:30px;
font-weight:bold;
}

.container{
max-width:700px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

button{
padding:14px 22px;
border:none;
border-radius:8px;
background:#4a90e2;
color:white;
font-size:18px;
cursor:pointer;
margin:10px;
}

.option{
display:block;
width:100%;
margin:10px 0;
padding:14px;
background:#eef3ff;
border-radius:8px;
cursor:pointer;
}

.option:hover{
background:#dfe8ff;
}

.correct{
background:#fde047 !important;
}

.wrong{
background:#fca5a5 !important;
}

.result{
font-size:26px;
font-weight:bold;
margin-top:20px;
}

</style>
</head>

<body>

<header>
導遊考試神器 V4000
</header>

<div class="container">

<div class="card" id="menu">

<h2>選擇刷題模式</h2>

<button onclick="startQuiz('resource')">觀光資源刷題</button>

<button onclick="startQuiz('practice')">導遊實務刷題</button>

<button onclick="startQuiz('law')">導遊法規刷題</button>

<button onclick="startQuiz('all')">全部題庫刷題</button>

</div>

<div class="card" id="quiz" style="display:none">

<h3 id="qNumber"></h3>

<h2 id="question"></h2>

<div id="options"></div>

<div id="explanation"></div>

<button onclick="nextQuestion()" id="nextBtn" style="display:none">下一題</button>

</div>

<div class="card" id="result" style="display:none">

<div class="result" id="scoreText"></div>

<button onclick="restart()">重新測驗</button>

</div>

</div>

<script>

const resourceQuestions=[
{q:"台灣最高山是？",a:["玉山","雪山","阿里山","合歡山"],c:0},
{q:"日月潭在哪個縣？",a:["南投","台中","嘉義","花蓮"],c:0},
{q:"太魯閣在哪？",a:["花蓮","台東","屏東","宜蘭"],c:0}
];

const practiceQuestions=[
{q:"導遊最重要的責任是？",a:["旅客安全","購物","拍照","聊天"],c:0},
{q:"旅客生病時導遊應？",a:["協助就醫","繼續行程","回飯店","購物"],c:0}
];

const lawQuestions=[
{q:"導遊執業需持？",a:["導遊證","身分證","駕照","護照"],c:0},
{q:"旅行業管理機關是？",a:["交通部觀光署","教育部","經濟部","內政部"],c:0}
];

let questions=[];
let quiz=[];
let current=0;
let score=0;

function shuffle(arr){
return arr.sort(()=>0.5-Math.random())
}

function startQuiz(type){

if(type=="resource") questions=resourceQuestions
if(type=="practice") questions=practiceQuestions
if(type=="law") questions=lawQuestions
if(type=="all") questions=[...resourceQuestions,...practiceQuestions,...lawQuestions]

quiz=shuffle([...questions])

current=0
score=0

document.getElementById("menu").style.display="none"
document.getElementById("quiz").style.display="block"

showQuestion()

}

function showQuestion(){

let q=quiz[current]

document.getElementById("qNumber").innerText=
"第 "+(current+1)+" 題 / "+quiz.length

document.getElementById("question").innerText=q.q

let html=""

for(let i=0;i<q.a.length;i++){

html+=`<div class="option" onclick="choose(${i})">${q.a[i]}</div>`

}

document.getElementById("options").innerHTML=html

document.getElementById("nextBtn").style.display="none"

}

function choose(i){

let q=quiz[current]

let opts=document.querySelectorAll(".option")

opts.forEach((el,index)=>{

if(index==q.c) el.classList.add("correct")

if(index==i && i!=q.c) el.classList.add("wrong")

})

if(i==q.c) score++

document.getElementById("nextBtn").style.display="inline-block"

}

function nextQuestion(){

current++

if(current<quiz.length){

showQuestion()

}else{

finish()

}

}

function finish(){

document.getElementById("quiz").style.display="none"
document.getElementById("result").style.display="block"

document.getElementById("scoreText").innerText=
"完成！得分 "+score+" / "+quiz.length

}

function restart(){

location.reload()

}

</script>

</body>
</html>
