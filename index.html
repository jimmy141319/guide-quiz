<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學習神器 V8</title>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0;text-align:center}
header{background:#4a90e2;color:white;padding:20px;font-size:26px}
.container{max-width:700px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:10px}
button{width:100%;padding:15px;margin:10px 0;font-size:18px;border:none;border-radius:8px;background:#4a90e2;color:white}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}
</style>
</head>

<body>

<header>學習神器 V8</header>

<div class="container">

<div class="card" id="menu">

<h2>選擇學習內容</h2>

<button onclick="start(guide)">導遊考試</button>
<button onclick="start(jpn)">日文</button>
<button onclick="start(eng)">英文會話</button>

</div>

<div class="card" id="quiz" style="display:none">

<h3 id="qnum"></h3>
<h2 id="question"></h2>

<button onclick="speak()">🔊 發音</button>

<div id="answers"></div>

<button onclick="next()">下一題</button>
<button onclick="home()">回首頁</button>

</div>

</div>

<script>

const guide=[
["台灣最高峰是？",["玉山","雪山","阿里山","合歡山"],0],
["日月潭在哪？",["南投","台中","嘉義","花蓮"],0]
]

const jpn=[
["ねこ 是？",["貓","狗","鳥","魚"],0],
["ありがとう 是？",["謝謝","你好","再見","對不起"],0]
]

const eng=[
["I appreciate your help.",["我很感謝你的幫助","我不需要幫助","請離開","我不喜歡你"],0],
["Let's schedule a meeting.",["安排會議","取消會議","回家","吃飯"],0]
]

let list=[]
let i=0

function start(arr){
document.getElementById("menu").style.display="none"
document.getElementById("quiz").style.display="block"
list=arr
i=0
show()
}

function show(){
let q=list[i]
document.getElementById("qnum").innerHTML="第 "+(i+1)+" 題"
document.getElementById("question").innerHTML=q[0]

let html=""
for(let j=0;j<q[1].length;j++){
html+=`<button onclick="answer(${j},this)">${q[1][j]}</button>`
}

document.getElementById("answers").innerHTML=html
}

function answer(n,btn){

let q=list[i]

let buttons=document.querySelectorAll("#answers button")

buttons.forEach(b=>b.disabled=true)

if(n==q[2]){
btn.classList.add("correct")
}else{
btn.classList.add("wrong")
}

}

function next(){
i++
if(i>=list.length){
alert("完成")
home()
return
}
show()
}

function home(){
location.reload()
}

function speak(){
let text=document.getElementById("question").innerText
let msg=new SpeechSynthesisUtterance(text)
speechSynthesis.speak(msg)
}

</script>

</body>
</html>
