<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>導遊考試刷題</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
padding:20px;
}

.box{
max-width:850px;
margin:auto;
background:white;
padding:24px;
border-radius:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.toolbar{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

select{
padding:10px;
font-size:16px;
border-radius:8px;
}

.meta{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:18px;
}

.q{
font-size:26px;
font-weight:bold;
margin:20px 0;
}

.answers{
display:grid;
gap:12px;
}

button{
padding:16px;
font-size:22px;
border:none;
border-radius:12px;
background:#e5e7eb;
}

.correct{
background:#fde047 !important;
}

.wrong{
background:#fca5a5 !important;
}

.controls{
text-align:center;
margin-top:16px;
}

.action{
background:#2563eb;
color:white;
margin:6px;
}

.result{
text-align:center;
font-size:22px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="box">

<h1>導遊考試刷題</h1>

<div class="toolbar">

<select id="subject" onchange="startQuiz()">
<option value="all">全部隨機</option>
<option value="resource">第一節：觀光資源</option>
<option value="law">第二節：法規行政</option>
<option value="practice">第三節：導遊實務</option>
</select>

<select id="count" onchange="startQuiz()">
<option value="10">練習10題</option>
<option value="50">模擬50題</option>
<option value="150">正式150題</option>
</select>

</div>

<div class="meta">

<div id="progress"></div>
<div id="score"></div>

</div>

<div class="q" id="question"></div>

<div class="answers">

<button id="btn0" onclick="selectAnswer(0)"></button>
<button id="btn1" onclick="selectAnswer(1)"></button>
<button id="btn2" onclick="selectAnswer(2)"></button>
<button id="btn3" onclick="selectAnswer(3)"></button>

</div>

<div class="result" id="result"></div>

<div class="controls">

<button class="action" onclick="showAnswer()">顯示答案</button>
<button class="action" onclick="nextQuestion()">下一題</button>

</div>

</div>

<script src="questions.js"></script>

<script>

let quizQuestions=[]
let current=0
let score=0
let locked=false
let currentOrder=[]

function shuffle(arr){
return [...arr].sort(()=>Math.random()-0.5)
}

function startQuiz(){

let subject=document.getElementById("subject").value
let count=parseInt(document.getElementById("count").value)

let pool=[...questions]

if(subject!="all"){
pool=pool.filter(q=>q.subject==subject)
}

pool=shuffle(pool)

quizQuestions=pool.slice(0,count)

current=0
score=0

render()

}

function render(){

let q=quizQuestions[current]

document.getElementById("progress").innerText=
`第 ${current+1} 題 / 共 ${quizQuestions.length} 題`

document.getElementById("score").innerText=
`答對 ${score} 題`

document.getElementById("question").innerText=q.q

currentOrder=[0,1,2,3].sort(()=>Math.random()-0.5)

for(let i=0;i<4;i++){

let btn=document.getElementById("btn"+i)

btn.innerText=q.options[currentOrder[i]]

btn.classList.remove("correct","wrong")

btn.disabled=false

}

locked=false

document.getElementById("result").innerText=""

}

function selectAnswer(i){

if(locked)return

locked=true

let q=quizQuestions[current]

let real=currentOrder[i]

for(let j=0;j<4;j++){

document.getElementById("btn"+j).disabled=true

}

if(real==q.answer){

document.getElementById("btn"+i).classList.add("correct")

document.getElementById("result").innerText="✔ 答對"

score++

}else{

document.getElementById("btn"+i).classList.add("wrong")

let correctIndex=currentOrder.indexOf(q.answer)

document.getElementById("btn"+correctIndex).classList.add("correct")

document.getElementById("result").innerText="✘ 答錯"

}

document.getElementById("score").innerText=
`答對 ${score} 題`

}

function showAnswer(){

let q=quizQuestions[current]

let index=currentOrder.indexOf(q.answer)

document.getElementById("btn"+index).classList.add("correct")

}

function nextQuestion(){

current++

if(current>=quizQuestions.length){

alert(`完成！

答對 ${score} / ${quizQuestions.length}`)

startQuiz()

return

}

render()

}

startQuiz()

</script>

</body>
</html>
