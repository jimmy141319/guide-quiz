<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>導遊考試神器 V6000</title>

<style>
body{
font-family:Arial;
background:#f5f7fb;
margin:0;
text-align:center;
}

header{
background:#4a90e2;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
margin-bottom:20px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#4a90e2;
color:white;
font-size:18px;
margin:6px;
cursor:pointer;
}

.option{
background:#eef3ff;
padding:12px;
margin:8px 0;
border-radius:8px;
cursor:pointer;
}

.correct{
background:#fde047;
}

.wrong{
background:#fca5a5;
}

.hidden{
display:none;
}
</style>

</head>
<body>

<header>
導遊考試神器 V6000
</header>

<div class="container">

<div class="card" id="home">

<h2>刷題系統</h2>

<button onclick="startQuiz('resource')">觀光資源</button>
<button onclick="startQuiz('practice')">導遊實務</button>
<button onclick="startQuiz('law')">導遊法規</button>
<button onclick="startQuiz('all')">全部題庫</button>
<button onclick="startExam()">模擬考試</button>

</div>

<div class="card hidden" id="quiz">

<div id="topbar"></div>

<h2 id="question"></h2>

<div id="options"></div>

<div id="explanation"></div>

<button onclick="nextQuestion()">下一題</button>

<button onclick="goHome()">回首頁</button>

</div>

</div>

<script>

const resourceBase=[
["台灣最高山是？",["玉山","雪山","阿里山","合歡山"],0],
["日月潭位於哪裡？",["台中","南投","嘉義","花蓮"],1],
["太魯閣國家公園在哪？",["花蓮","台東","屏東","新竹"],0]
];

const practiceBase=[
["導遊最重要責任？",["旅客安全","購物","拍照","自由"],0],
["旅客走失怎麼辦？",["聯絡找回","不管","先吃飯","回飯店"],0],
["導遊解說應？",["清楚正確","隨便","越快越好","不說"],0]
];

const lawBase=[
["導遊證照由誰管理？",["交通部觀光署","教育部","文化部","警察局"],0],
["導遊執業需？",["導遊證","駕照","學生證","護照"],0],
["旅行業應重視？",["旅客權益","購物","速度","利潤"],0]
];

function generate(base,count){
let arr=[];
for(let i=0;i<count;i++){
let q=base[i%base.length];
arr.push({
q:q[0]+"（"+(i+1)+"）",
a:q[1],
c:q[2]
});
}
return arr;
}

const resource=generate(resourceBase,300);
const practice=generate(practiceBase,300);
const law=generate(lawBase,300);

let quiz=[];
let current=0;
let score=0;

function startQuiz(type){

document.getElementById("home").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

if(type==="resource") quiz=[...resource];
if(type==="practice") quiz=[...practice];
if(type==="law") quiz=[...law];
if(type==="all") quiz=[...resource,...practice,...law];

current=0;
score=0;

showQuestion();
}

function startExam(){

quiz=[...resource,...practice,...law]
.sort(()=>0.5-Math.random())
.slice(0,50);

document.getElementById("home").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

current=0;
score=0;

showQuestion();
}

function showQuestion(){

let q=quiz[current];

document.getElementById("topbar").innerText=
"第 "+(current+1)+" 題 / "+quiz.length;

document.getElementById("question").innerText=q.q;

let html="";

for(let i=0;i<q.a.length;i++){

html+=`<div class="option" onclick="choose(${i})">${q.a[i]}</div>`;

}

document.getElementById("options").innerHTML=html;

}

function choose(i){

let q=quiz[current];

let opts=document.querySelectorAll(".option");

opts.forEach((o,index)=>{

if(index===q.c) o.classList.add("correct");

if(index===i && i!==q.c) o.classList.add("wrong");

});

if(i===q.c) score++;

}

function nextQuestion(){

current++;

if(current<quiz.length){

showQuestion();

}else{

alert("完成！得分："+score+"/"+quiz.length);

goHome();

}

}

function goHome(){

document.getElementById("quiz").classList.add("hidden");
document.getElementById("home").classList.remove("hidden");

}

</script>

</body>
</html>
