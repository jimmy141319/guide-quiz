<style>

.container{max-width:860px;margin:30px auto;background:white;padding:24px;border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,0.08);}
h1{text-align:center;margin-bottom:8px;font-size:34px;}
.subtitle{text-align:center;color:#666;margin-bottom:18px;}

.wrong{background:#fca5a5 !important;}
.result{margin-top:18px;text-align:center;font-size:24px;font-weight:bold;min-height:34px;}

.hidden{display:none;}
.finish{text-align:center;padding:20px 0;}
.finish h2{font-size:32px;margin-bottom:12px;}
.score{font-size:28px;font-weight:bold;margin-bottom:8px;}
.rate{font-size:22px;color:#555;margin-bottom:16px;}

</style>
</head>

</div>
<div id="quiz-area">
<div class="status"><div id="progress-text"></div><div id="score-text"></div></div>

<div class="question" id="question"></div>
<div class="answers">

<button class="answer-btn" id="btn2" onclick="selectAnswer(2)"></button>
<button class="answer-btn" id="btn3" onclick="selectAnswer(3)"></button>
</div>
<div class="result" id="result"></div>
<div class="note" id="note"></div>
<div class="controls">
<button class="btn" onclick="showAnswer()">顯示答案</button>
<button class="btn hidden" id="nextBtn" onclick="nextQuestion()">下一題</button>
<button class="btn" onclick="clearWrongBook()">清空錯題本</button>
</div>
</div>
<div id="finish-area" class="hidden">
<div class="finish">
<h2>測驗完成</h2>
<div class="score" id="final-score"></div>
<div class="rate" id="final-rate"></div>
<button class="btn" onclick="restartQuiz()">重新開始</button>
</div>
</div>
</div>

let questions = [];
let current = 0;
let score = 0;
let answered = false;
let answerShown = false;

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function getWrongBook() {
  try {
    return JSON.parse(localStorage.getItem("guideQuizWrongBook") || "[]");
  } catch (e) {
    return [];
  }
}

function saveWrongBook(ids) {
  localStorage.setItem("guideQuizWrongBook", JSON.stringify(ids));
}

function addWrongQuestion(q) {
  const ids = getWrongBook();
  if (!ids.includes(q.q)) {
    ids.push(q.q);
    saveWrongBook(ids);
  }
}

function clearWrongBook() {
  localStorage.removeItem("guideQuizWrongBook");
  alert("錯題本已清空");
  if (document.getElementById("subject").value === "wrong") restartQuiz();
}

function buildQuestions() {
  const mode = document.getElementById("mode").value;
  const subject = document.getElementById("subject").value;
  let filtered = [...allQuestions];

  if (subject === "wrong") {
    const wrongKeys = getWrongBook();
    filtered = filtered.filter(q => wrongKeys.includes(q.q));
  } else if (subject !== "all") {
    filtered = filtered.filter(q => q.subject === subject);
  }

  const shuffled = shuffleArray(filtered);
  if (mode === "10") questions = shuffled.slice(0, 10);
  else if (mode === "50") questions = shuffled.slice(0, 50);
  else if (mode === "100") questions = shuffled.slice(0, 100);
  else questions = shuffled;
}

function resetButtons() {
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById("btn" + i);
    btn.classList.remove("correct", "wrong");
    btn.disabled = false;
  }
}

function loadQuestion() {
  if (!questions.length) {
    document.getElementById("question-number").innerText = "";
    document.getElementById("question").innerText = "目前沒有題目";
    document.getElementById("progress-text").innerText = "第 0 題 / 共 0 題";
    document.getElementById("score-text").innerText = "目前答對：0 題";
    document.getElementById("result").innerText = "";
    document.getElementById("note").innerText = document.getElementById("subject").value === "wrong" ? "錯題本目前是空的" : "";
    for (let i = 0; i < 4; i++) {
      const btn = document.getElementById("btn" + i);
      btn.innerText = "";
      btn.disabled = true;
      btn.classList.remove("correct","wrong");
    }
    document.getElementById("nextBtn").classList.add("hidden");
    return;
  }

  answered = false;
  answerShown = false;
  document.getElementById("result").innerText = "";
  document.getElementById("note").innerText = "";
  document.getElementById("nextBtn").classList.add("hidden");
  const q = questions[current];
  document.getElementById("progress-text").innerText = `第 ${current + 1} 題 / 共 ${questions.length} 題`;
  document.getElementById("score-text").innerText = `目前答對：${score} 題`;
  document.getElementById("question-number").innerText = `題目 ${current + 1}`;
  document.getElementById("question").innerText = q.q;
  for (let i = 0; i < 4; i++) {
    document.getElementById("btn" + i).innerText = q.options[i];
  }
  resetButtons();
}

function showAnswer() {
  if (!questions.length || answered || answerShown) return;
  const q = questions[current];
  document.getElementById("btn" + q.answer).classList.add("correct");
  document.getElementById("note").innerText = `正確答案：${q.options[q.answer]}`;
  answerShown = true;
  document.getElementById("nextBtn").classList.remove("hidden");
}

function selectAnswer(index) {
  if (!questions.length || answered) return;
  answered = true;
  const q = questions[current];
  for (let i = 0; i < 4; i++) {
    document.getElementById("btn" + i).disabled = true;
  }
  if (index === q.answer) {
    document.getElementById("btn" + index).classList.add("correct");
    document.getElementById("result").innerText = "✔ 答對了";
    score++;
  } else {
    document.getElementById("btn" + index).classList.add("wrong");
    document.getElementById("btn" + q.answer).classList.add("correct");
    document.getElementById("result").innerText = "✘ 答錯了";
    addWrongQuestion(q);
  }
  document.getElementById("note").innerText = `正確答案：${q.options[q.answer]}`;
  document.getElementById("score-text").innerText = `目前答對：${score} 題`;
  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion() {
  if (!questions.length) return;
  current++;
  if (current < questions.length) loadQuestion();
  else showFinal();
}

function showFinal() {
  document.getElementById("quiz-area").classList.add("hidden");
  document.getElementById("finish-area").classList.remove("hidden");
  const rate = Math.round((score / questions.length) * 100);
  document.getElementById("final-score").innerText = `你答對了 ${score} / ${questions.length} 題`;
  document.getElementById("final-rate").innerText = `正確率：${rate}%`;
}

function restartQuiz() {
  buildQuestions();
  current = 0;
  score = 0;
  answered = false;
  answerShown = false;
  document.getElementById("finish-area").classList.add("hidden");
  document.getElementById("quiz-area").classList.remove("hidden");
  loadQuestion();
}

restartQuiz();
</script>
